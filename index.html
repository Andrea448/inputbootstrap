<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Prijava udruženja</title>
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="card shadow">
<div class="card-body">

<h4 class="mb-4 text-center">Podaci o udruženju</h4>

<form>

<div class="mb-3">
<label class="form-label">1. Naziv udruženja</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">2. Skraćeni naziv udruženja</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">3. Sjedište udruženja (mjesto, ulica, broj)</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">4. Datum osnivanja osnivačkog tijela</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">5. Email udruženja</label>
<input type="email" class="form-control">
</div>

<div class="d-grid">
<button class="btn btn-primary">Pošalji</button>
</div>

</form>

</div>
</div>

</div>
</div>
</div>

</body>
</html>
